services:
  agentd:
    environment:
      AGENT_SERVER_VOICE_PROVIDER: funasr_http
      AGENT_SERVER_VOICE_ASR_URL: http://funasr-worker:8091/v1/asr/transcribe
    depends_on:
      funasr-worker:
        condition: service_healthy

  funasr-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/funasr-worker.cpu.Dockerfile
    env_file:
      - ./.env.docker
    environment:
      AGENT_SERVER_FUNASR_HOST: 0.0.0.0
      AGENT_SERVER_FUNASR_PORT: 8091
      AGENT_SERVER_FUNASR_DEVICE: cpu
    ports:
      - "8091:8091"
    volumes:
      - modelscope-cache:/models/modelscope
      - hf-cache:/models/hf
      - torch-cache:/models/torch
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=5).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  modelscope-cache:
  hf-cache:
  torch-cache:

